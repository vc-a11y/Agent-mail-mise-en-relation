<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Mail — Les Clés de l'Atelier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0EEE8;--surface:#FFFFFF;--border:#E0DDD5;--border-mid:#C8C5BB;
  --text:#1A1916;--muted:#6A6860;--hint:#AAA89F;
  --font:'DM Sans',sans-serif;--serif:'DM Serif Display',serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}
body{display:flex;flex-direction:column;}

/* NAV */
nav{height:52px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.nav-l{display:flex;align-items:center;gap:10px;}
.logo{width:28px;height:28px;border-radius:7px;background:var(--text);display:flex;align-items:center;justify-content:center;}
.logo svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2;}
.nav-name{font-size:14px;font-weight:500;}
.nav-div{width:1px;height:14px;background:var(--border-mid);}
.nav-sub{font-size:12px;color:var(--muted);}
.pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:3px 10px;border-radius:20px;}
.dot{width:5px;height:5px;border-radius:50%;background:#4CAF50;}
.dot.busy{background:#FF9800;animation:bl .7s infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}

.layout{flex:1;display:flex;min-height:0;overflow:hidden;}

/* ═══ PANEL GAUCHE ═══ */
.panel{width:320px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-scroll{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:1rem;}
.panel-foot{padding:1rem 1.25rem;border-top:1px solid var(--border);}

.sec-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--hint);margin-bottom:.5rem;}

/* Filière */
.fil-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.fil{border:1.5px solid var(--border);border-radius:8px;padding:8px 5px 7px;cursor:pointer;background:var(--surface);font-family:var(--font);font-size:11px;font-weight:500;color:var(--muted);text-align:center;transition:all .13s;display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.2;}
.fil:hover{border-color:var(--border-mid);color:var(--text);}
.fil.on{color:#fff;border-color:transparent;}
.fil-dot{width:8px;height:8px;border-radius:50%;}

/* Fields */
.f{display:flex;flex-direction:column;gap:4px;}
.f label{font-size:11px;font-weight:500;color:var(--muted);}
.f input,.f select{font-family:var(--font);font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);outline:none;}
.f input:focus,.f select:focus{border-color:var(--border-mid);}

/* Candidats */
.cand-block{border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.cand-top{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg);border-bottom:1px solid var(--border);}
.cand-num{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.cand-del{border:none;background:none;cursor:pointer;color:var(--hint);font-size:16px;line-height:1;transition:color .12s;}
.cand-del:hover{color:#E24B4A;}
.cand-inner{padding:9px;display:flex;flex-direction:column;gap:7px;}
.ci{font-family:var(--font);font-size:12px;padding:7px 9px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);outline:none;width:100%;}
.ci:focus{border-color:var(--border-mid);}
textarea.ci{min-height:68px;resize:vertical;line-height:1.55;}

.add-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:8px;border:1.5px dashed var(--border-mid);border-radius:8px;background:none;font-family:var(--font);font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .13s;}
.add-btn:hover{border-color:var(--text);color:var(--text);}

/* Tone */
.tone-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.tone{border:1px solid var(--border);border-radius:7px;padding:7px 4px;cursor:pointer;background:var(--surface);font-family:var(--font);font-size:11px;font-weight:500;color:var(--muted);text-align:center;transition:all .13s;}
.tone:hover{border-color:var(--border-mid);color:var(--text);}
.tone.on{background:var(--text);color:#fff;border-color:transparent;}

.gen{width:100%;padding:11px;border:none;border-radius:9px;font-family:var(--font);font-size:13px;font-weight:500;color:#fff;cursor:pointer;transition:opacity .15s;background:var(--text);display:flex;align-items:center;justify-content:center;gap:7px;}
.gen:disabled{opacity:.35;cursor:default;}
.gen:not(:disabled):hover{opacity:.85;}

/* ═══ MAIN ═══ */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.main-body{flex:1;overflow-y:auto;padding:2rem;}

.empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;color:var(--muted);text-align:center;}
.empty-icon{width:56px;height:56px;border-radius:14px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;}
.empty h2{font-size:16px;font-weight:500;color:var(--text);}
.empty p{font-size:13px;max-width:280px;line-height:1.6;}

/* ═══ MAIL PREVIEW ═══ */
.output-wrap{max-width:760px;}

/* Points saillants */
.highlights{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.hl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;}
.hl-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;}
.hl-cands{display:flex;flex-direction:column;gap:.875rem;}
.hl-cand-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:.4rem;}
.hl-tags{display:flex;flex-wrap:wrap;gap:5px;}
.hl-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px;}

/* Mail design */
.mail-preview{border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:1rem;}
.mail-chrome{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.mail-chrome-l{display:flex;align-items:center;gap:8px;}
.mail-chrome-badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
.mail-actions{display:flex;gap:6px;}
.m-btn{border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text);transition:all .13s;display:flex;align-items:center;gap:5px;}
.m-btn:hover{background:var(--bg);}
.m-btn.ok{background:var(--text);color:#fff;border-color:transparent;}

/* Corps du mail mis en forme */
.mail-body-rendered{background:var(--surface);padding:0;}
.mail-inner{padding:2rem 2.5rem;max-width:620px;margin:0 auto;}
.mail-lcdla-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:1.25rem;margin-bottom:1.5rem;border-bottom:2px solid var(--text);}
.mail-org-name{font-family:var(--serif);font-size:18px;color:var(--text);}
.mail-org-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.mail-filiere-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;}
.mail-content{font-size:13.5px;line-height:1.85;color:var(--text);}
.mail-content p{margin-bottom:1em;}
.mail-content p:last-child{margin-bottom:0;}
.mail-cand-card{border-radius:10px;padding:1rem 1.25rem;margin:1rem 0;}
.mail-cand-card-name{font-size:14px;font-weight:600;margin-bottom:.5rem;}
.mail-cand-card-pts{display:flex;flex-direction:column;gap:.25rem;}
.mail-cand-pt{display:flex;align-items:flex-start;gap:7px;font-size:13px;line-height:1.5;}
.mail-cand-bullet{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.mail-divider{height:1px;background:var(--border);margin:1.25rem 0;}
.mail-footer-line{font-size:12px;color:var(--muted);padding-top:.875rem;border-top:1px solid var(--border);margin-top:1.25rem;}

/* Regen bar */
.regen{border-top:1px solid var(--border);background:var(--surface);padding:.875rem 1.5rem;display:flex;gap:8px;align-items:flex-end;}
.regen textarea{flex:1;font-family:var(--font);font-size:13px;padding:8px 12px;border:1px solid var(--border);border-radius:9px;background:var(--bg);color:var(--text);resize:none;min-height:38px;max-height:100px;line-height:1.5;outline:none;}
.regen textarea:focus{border-color:var(--border-mid);}
.regen textarea::placeholder{color:var(--hint);}
.regen-send{width:36px;height:36px;border:none;border-radius:8px;background:var(--text);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .15s;}
.regen-send:disabled{opacity:.3;cursor:default;}
.regen-send svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.2;}

/* Thinking */
.think-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);padding:1.25rem 0;}
.think-wrap span{width:6px;height:6px;border-radius:50%;background:var(--hint);animation:td .9s ease-in-out infinite;display:inline-block;margin-right:2px;}
.think-wrap span:nth-child(2){animation-delay:.15s;}
.think-wrap span:nth-child(3){animation-delay:.3s;}
@keyframes td{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.1);opacity:1}}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:4px;}
</style>
</head>
<body>

<nav>
  <div class="nav-l">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    <span class="nav-name">Agent Mail</span>
    <div class="nav-div"></div>
    <span class="nav-sub">Les Clés de l'Atelier</span>
  </div>
  <div class="pill"><div class="dot" id="sDot"></div><span id="sTxt">Prêt</span></div>
</nav>

<div class="layout">

  <!-- PANEL -->
  <aside class="panel">
    <div class="panel-scroll">

      <div>
        <p class="sec-label">Filière</p>
        <div class="fil-grid" id="filGrid"></div>
      </div>

      <div>
        <p class="sec-label">Entreprise</p>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div class="f"><label>Interlocuteur</label>
            <div style="display:grid;grid-template-columns:110px 1fr;gap:6px;">
              <select id="civilite" style="font-family:var(--font);font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);outline:none;">
                <option value="M.">M.</option>
                <option value="Mme">Mme</option>
                <option value="">Non précisé</option>
              </select>
              <input id="interlo" placeholder="Nom de famille" style="font-family:var(--font);font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);outline:none;">
            </div>
          </div>
          <div class="f"><label>Entreprise</label><input id="entrep" placeholder="ex: SOLYPER Bâtiment"></div>
          <div class="f"><label>Type</label>
            <select id="typeEnt">
              <option value="artisan">Artisan / TPE</option>
              <option value="pme">PME</option>
              <option value="grand">Grand groupe / ETI</option>
              <option value="collectivite">Collectivité / Public</option>
            </select>
          </div>
          <div class="f"><label>Contexte</label>
            <select id="origine">
              <option value="recommandation">Recommandation / échange direct</option>
              <option value="prospection">Prospection sortante</option>
              <option value="reponse">Réponse à une offre</option>
              <option value="relance">Relance d'un contact existant</option>
            </select>
          </div>
        </div>
      </div>

      <div>
        <p class="sec-label">Candidats</p>
        <div id="candList" style="display:flex;flex-direction:column;gap:7px;"></div>
        <button class="add-btn" onclick="addCand()" style="margin-top:7px;">+ Ajouter un candidat</button>
      </div>

      <div>
        <p class="sec-label">Ton</p>
        <div class="tone-row">
          <button class="tone on" id="t-pro" onclick="setTone('pro')">Professionnel</button>
          <button class="tone" id="t-dyn" onclick="setTone('dyn')">Dynamique</button>
          <button class="tone" id="t-cha" onclick="setTone('cha')">Chaleureux</button>
        </div>
      </div>

    </div>
    <div class="panel-foot">
      <button class="gen" id="genBtn" disabled onclick="generate()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9z"/></svg>
        Générer le mail
      </button>
      <p style="font-size:11px;color:var(--hint);text-align:center;margin-top:7px;line-height:1.4;">Points saillants extraits + mail designé prêt pour HUB3E.</p>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-body" id="mainBody">
      <div class="empty" id="emptyEl">
        <div class="empty-icon">✦</div>
        <h2>Agent Mail</h2>
        <p>Renseignez filière, entreprise et candidats — l'agent extrait les points saillants et rédige un mail designé.</p>
      </div>
    </div>
    <div class="regen">
      <textarea id="regenTa" placeholder="Modifier le ton, raccourcir, ajouter un élément…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();regen();}" disabled></textarea>
      <button class="regen-send" id="regenBtn" onclick="regen()" disabled>
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </main>
</div>

<script>
const FIL={
  PB:{l:"Peintre en bâtiment",c:"#9fae00",d:"#6b7600",lt:"#f4f6dc"},
  ITS:{l:"Plombier-Chauffagiste",c:"#5c2576",d:"#3d1a50",lt:"#f2ecf7"},
  EEB:{l:"Électricien bâtiment",c:"#c49b00",d:"#8a6c00",lt:"#fdf8e6"},
  AMB:{l:"Agent maint. bâtiment",c:"#e64415",d:"#a82e0c",lt:"#fdf0ec"},
  MEN:{l:"Menuisier installateur",c:"#4c5c96",d:"#323d65",lt:"#eef0f8"},
  CZ:{l:"Couvreur-Zingueur",c:"#F37107",d:"#b35105",lt:"#fef3e8"},
  ETA:{l:"Étancheur",c:"#D11725",d:"#8f101a",lt:"#fceced"},
  FAC:{l:"Façadier",c:"#e4265a",d:"#9e1a3e",lt:"#fdeef3"},
  BSO:{l:"Second Œuvre",c:"#568146",d:"#3a5830",lt:"#eef4eb"},
  POLYVALENT:{l:"Polyvalent",c:"#2E7D7D",d:"#1a5252",lt:"#e8f5f5"},
};
const FTIT={PB:"Titre Pro Peintre en Bâtiment",ITS:"Titre Pro Plombier-Chauffagiste",EEB:"Titre Pro Électricien d'Équipement",AMB:"Titre Pro Agent de Maintenance",MEN:"Titre Pro Menuisier Installateur",CZ:"Titre Pro Couvreur-Zingueur",ETA:"Titre Pro Étancheur",FAC:"Titre Pro Façadier",BSO:"Titre Pro Second Œuvre",POLYVALENT:"formation bâtiment en alternance"};

let fil=null,tone='pro',busy=false,lastMail='',lastStruct=null,nc=0;

/* GRID */
(function buildGrid(){
  document.getElementById('filGrid').innerHTML=Object.entries(FIL).map(([id,f])=>
    `<button class="fil" id="fb-${id}" onclick="setFil('${id}')">
      <span class="fil-dot" style="background:${f.c}"></span>${f.l}</button>`).join('');
})();

function setFil(id){
  fil=id;
  document.querySelectorAll('.fil').forEach(b=>{b.classList.remove('on');b.style.background='';b.style.color='';});
  const b=document.getElementById('fb-'+id);b.classList.add('on');b.style.background=FIL[id].c;
  checkReady();
}
function setTone(t){tone=t;document.querySelectorAll('.tone').forEach(b=>b.classList.remove('on'));document.getElementById('t-'+t).classList.add('on');}

/* CANDIDATS */
function addCand(){
  nc++;const n=nc;
  const div=document.createElement('div');div.className='cand-block';div.id='cb-'+n;
  div.innerHTML=`<div class="cand-top">
    <span class="cand-num">Candidat ${n}</span>
    ${n>1?`<button class="cand-del" onclick="document.getElementById('cb-${n}').remove();checkReady()">×</button>`:''}
  </div>
  <div class="cand-inner">
    <input class="ci" id="cn-${n}" placeholder="Prénom Nom" oninput="checkReady()">
    <textarea class="ci" id="cc-${n}" placeholder="Commentaire libre : âge, expériences, points forts, permis, motivations…" oninput="checkReady()"></textarea>
  </div>`;
  document.getElementById('candList').appendChild(div);
  document.getElementById('cc-'+n).focus();
  checkReady();
}

function getCands(){
  return Array.from(document.querySelectorAll('.cand-block')).map(b=>{
    const id=b.id.replace('cb-','');
    return{nom:document.getElementById('cn-'+id)?.value?.trim()||'',txt:document.getElementById('cc-'+id)?.value?.trim()||''};
  }).filter(c=>c.txt);
}

function checkReady(){document.getElementById('genBtn').disabled=!(fil&&getCands().length>0);}

/* EXTRACTION POINTS SAILLANTS */
function extractPoints(txt,filId){
  const c=txt.toLowerCase();const pts=[];
  // Âge
  const am=txt.match(/\b(\d{2})\s*ans\b/);if(am)pts.push({ico:'👤',txt:`${am[1]} ans`});
  // Permis
  if(c.includes('permis')&&(c.includes('véhicule')||c.includes('voiture')||c.includes('personnel')))pts.push({ico:'🚗',txt:'Permis B + véhicule'});
  else if(c.includes('permis b'))pts.push({ico:'🚗',txt:'Permis B'});
  // Dispo
  if(c.includes('immédiat')||c.includes('disponible immédiat'))pts.push({ico:'📅',txt:'Disponible immédiatement'});
  // Expérience chantier
  if(c.includes('chantier'))pts.push({ico:'🏗️',txt:'Expérience chantier'});
  if(c.includes('hauteur'))pts.push({ico:'⬆️',txt:'Travail en hauteur'});
  if(c.includes('alternance')||c.includes('apprentissage'))pts.push({ico:'📋',txt:'Expérience en alternance'});
  // Qualités
  if(c.includes('sérieux')||c.includes('serieux'))pts.push({ico:'⭐',txt:'Sérieux et fiable'});
  if(c.includes('ponctuel'))pts.push({ico:'⏰',txt:'Ponctuel'});
  if(c.includes('motivé')||c.includes('motive'))pts.push({ico:'🔥',txt:'Très motivé'});
  if(c.includes('autonome'))pts.push({ico:'💪',txt:'Autonome'});
  if(c.includes('polyvalent'))pts.push({ico:'🔄',txt:'Profil polyvalent'});
  // Filière
  const fm={PB:['peinture','enduit','peint'],ITS:['plomberie','chauffage','cvc','soudure'],EEB:['électricité','câblage','habilitation'],AMB:['maintenance','entretien'],MEN:['menuiserie','bois','pose'],CZ:['couverture','toiture','zinguerie'],ETA:['étanchéité'],FAC:['façade'],BSO:['second œuvre','cloison','placo']};
  if((fm[filId]||[]).some(m=>c.includes(m)))pts.push({ico:'✅',txt:`Expérience ${FIL[filId].l}`});
  // Diplôme
  const dm=txt.match(/(?:CAP|BTS|Titre pro|Bac pro)[^,.\n]{0,35}/i);
  if(dm)pts.push({ico:'🎓',txt:dm[0].trim()});
  return pts.slice(0,5);
}

/* PROMPT */
function buildPrompt(modif){
  const f=FIL[fil];
  const civilite=document.getElementById('civilite').value.trim();
  const nom=document.getElementById('interlo').value.trim();
  const interlo=civilite&&nom?`${civilite} ${nom}`:nom||civilite||'Madame, Monsieur';
  const entrep=document.getElementById('entrep').value.trim()||'votre entreprise';
  const te={artisan:'artisan/TPE',pme:'PME',grand:'grand groupe/ETI',collectivite:'collectivité'}[document.getElementById('typeEnt').value];
  const orig={recommandation:'suite à un échange direct',prospection:'dans le cadre d\'une prospection',reponse:'en réponse à une offre d\'alternance',relance:'dans le cadre d\'une relance'}[document.getElementById('origine').value];
  const tn={pro:'professionnel et structuré',dyn:'dynamique et percutant',cha:'chaleureux et humain'}[tone];
  const cands=getCands();
  const ft=FTIT[fil];

  const candBlock=cands.map((c,i)=>{
    const pts=extractPoints(c.txt,fil).map(p=>p.txt).join(', ');
    return `CANDIDAT ${i+1}${c.nom?' – '+c.nom:''}:\nCommentaire brut : ${c.txt}\nPoints saillants déjà extraits : ${pts}`;
  }).join('\n\n');

  return`Tu rédiges un mail de mise en relation pour Les Clés de l'Atelier (organisme de formation bâtiment, alternance, Lyon La Mulatière).

PARAMÈTRES :
- Interlocuteur : ${interlo} (${te})
- Entreprise : ${entrep}
- Contexte : ${orig}
- Formation : ${ft}
- Ton : ${tn}
- Candidats : ${cands.length}

${candBlock}

STRUCTURE DU MAIL À GÉNÉRER :
1. Objet (1 ligne percutante)
2. Corps du mail structuré en paragraphes

CONSIGNES :
- Commencer par "Bonjour ${interlo},"
- Accroche percutante adaptée au contexte (${orig})
- Brève présentation Les Clés de l'Atelier (formation bâtiment, alternance, Lyon)
- ${cands.length===1?'Présentation valorisée du candidat avec ses vrais points forts pour '+f.l:'Présentation de chaque candidat avec ses points forts, bien séparés et identifiés'}
- Rythme alternance : 1 semaine/mois formation + 3 semaines entreprise (contrat possible jusqu'à 3 mois avant rentrée)
- Aides employeur disponibles (page : lesclesdelatelier.fr/cote-entreprise/)
- Si éligibles clauses sociales : 1 phrase
- Call to action clair
- Signature : L'équipe Les Clés de l'Atelier

RÈGLES :
- Texte brut, paragraphes séparés par lignes vides
- Première ligne = "Objet : [objet du mail]" puis ligne vide puis le corps
- Maximum 380 mots
- NE PAS inventer d'infos absentes des commentaires
- Ton : ${tn}
${modif?'\nMODIFICATION DEMANDÉE : '+modif:''}

Retourne UNIQUEMENT : ligne "Objet : ..." puis le corps du mail. Texte brut.`;
}

/* GÉNÉRATION */
async function generate(){
  if(!fil||busy)return;
  document.getElementById('emptyEl')?.remove();
  busy=true;setStatus('busy');
  const tid=addThink();
  try{
    const r=await fetch('/api/generate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:buildPrompt('')})
    });
    const d=await r.json();removeThink(tid);
    const mail=d.text||d.error||'Erreur.';
    lastMail=mail;lastStruct={mail,cands:getCands(),fil};
    render(mail);
    document.getElementById('regenTa').disabled=false;
    document.getElementById('regenBtn').disabled=false;
  }catch(e){removeThink(tid);showErr('Erreur : '+e.message);}
  busy=false;setStatus('ready');
}

async function regen(){
  const ta=document.getElementById('regenTa');
  const modif=ta.value.trim();if(!modif||busy)return;
  ta.value='';ta.style.height='auto';
  busy=true;setStatus('busy');const tid=addThink();
  try{
    const r=await fetch('/api/generate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:[
        {role:'user',content:buildPrompt('')},
        {role:'assistant',content:lastMail},
        {role:'user',content:`Modifie ce mail selon : ${modif}. Même format (Objet: puis corps). Texte brut.`}
      ]})
    });
    const d=await r.json();removeThink(tid);
    const mail=d.text||d.error||'Erreur.';
    lastMail=mail;render(mail);
  }catch(e){removeThink(tid);showErr('Erreur : '+e.message);}
  busy=false;setStatus('ready');
}

/* RENDU */
function render(rawMail){
  const body=document.getElementById('mainBody');
  document.getElementById('hlBox')?.remove();
  document.getElementById('mailPrev')?.remove();

  const f=FIL[fil];
  const cands=getCands();
  const entrep=document.getElementById('entrep').value.trim()||'Entreprise';

  // Extraire objet et corps
  const lines=rawMail.split('\n');
  let objet='', corps='';
  if(lines[0].toLowerCase().startsWith('objet')){
    objet=lines[0].replace(/^objet\s*:\s*/i,'').trim();
    corps=lines.slice(2).join('\n').trim();
  } else {corps=rawMail.trim();}

    const pts=extractPoints(c.txt,fil);

function formatMailBody(corps,cands,f){
  // Séparer en paragraphes
  const paras=corps.split(/\n\n+/).filter(p=>p.trim());
  let html='';
  paras.forEach(p=>{
    const t=p.trim();
    // Détecter si c'est une section candidat (contient un nom de candidat ou "candidat N")
    const isCandSection=cands.some(c=>c.nom&&t.includes(c.nom))||/candidat\s+\d/i.test(t);
    if(isCandSection&&cands.length>1){
      // Encadré candidat
      html+=`<div class="mail-cand-card" style="background:${f.c}0d;border:1px solid ${f.c}30;">
        <div class="mail-cand-card-name" style="color:${f.d};">${esc(t.split('\n')[0])}</div>
        ${t.split('\n').slice(1).filter(l=>l.trim()).map(l=>`
        <div class="mail-cand-pt">
          <div class="mail-cand-bullet" style="background:${f.c};"></div>
          <div>${esc(l.replace(/^[-•·]\s*/,''))}</div>
        </div>`).join('')}
      </div>`;
    } else {
      // Paragraphe normal — avec lignes internes
      const lines=t.split('\n').filter(l=>l.trim());
      if(lines.length===1){
        html+=`<p>${esc(t)}</p>`;
      } else {
        html+=`<p>${lines.map(l=>esc(l)).join('<br>')}</p>`;
      }
    }
  });
  return html;
}

function addThink(){

  const d=document.createElement('div');d.id=id;
  d.innerHTML=`<div class="think-row"><div class="think-wrap"><span></span><span></span><span></span></div>Génération du mail…</div>`;
  b.appendChild(d);b.scrollTop=9999;return id;
}
function removeThink(id){document.getElementById(id)?.remove();}
function showErr(m){
  const d=document.createElement('div');
  d.style.cssText='padding:.75rem 1rem;background:#FCEBEB;border-radius:8px;font-size:13px;color:#A32D2D;margin-bottom:1rem;';
  d.textContent=m;document.getElementById('mainBody').appendChild(d);
}
function setStatus(s){
  document.getElementById('sDot').className=s==='busy'?'dot busy':'dot';
  document.getElementById('sTxt').textContent=s==='busy'?'Génération…':'Prêt';
}
async function copyMail(){
  const txt=lastMail;
  try{await navigator.clipboard.writeText(txt);}
  catch(e){const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  const b=document.getElementById('copyBtn');
  b.classList.add('ok');b.textContent='✓ Copié !';
  setTimeout(()=>{b.classList.remove('ok');b.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copier pour HUB3E`;},2500);
}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

});
